name: Huurwoning Monitor

on:
  schedule:
    # ~Elke 30 min maar op onregelmatige tijden
    - cron: '3,38 0,4,8,12,16,20 * * *'
    - cron: '11,47 1,5,9,13,17,21 * * *'
    - cron: '22,53 2,6,10,14,18,22 * * *'
    - cron: '17,44 3,7,11,15,19,23 * * *'
  workflow_dispatch: {}       # Handmatig starten

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps

      - name: Random delay
        run: sleep $((RANDOM % 120 + 30))

      - name: Run monitor
        env:
          VESTEDA_EMAIL: ${{ secrets.VESTEDA_EMAIL }}
          VESTEDA_WACHTWOORD: ${{ secrets.VESTEDA_WACHTWOORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python vesteda_monitor.py || true

      - name: Save known properties
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bekende_woningen.json || true
          git diff --staged --quiet || git commit -m "Update bekende woningen"
          git push || true
