name: Huurwoning Monitor

on:
  schedule:
    # Verschillende tijden om niet als scraper gezien te worden
    - cron: '7 */2 * * *'    # Om 0:07, 2:07, 4:07, etc (overdag)
    - cron: '23 1,5,9,13,17,21 * * *'  # Om 1:23, 5:23, 9:23, etc
    - cron: '41 3,7,11,15,19,23 * * *' # Om 3:41, 7:41, 11:41, etc
  workflow_dispatch: {}       # Handmatig starten

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps

      - name: Random delay
        run: sleep $((RANDOM % 120 + 30))

      - name: Run monitor
        env:
          VESTEDA_EMAIL: ${{ secrets.VESTEDA_EMAIL }}
          VESTEDA_WACHTWOORD: ${{ secrets.VESTEDA_WACHTWOORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python vesteda_monitor.py

      - name: Save known properties
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bekende_woningen.json || true
          git diff --staged --quiet || git commit -m "Update bekende woningen"
          git push || true
