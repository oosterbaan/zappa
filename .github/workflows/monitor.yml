name: Huurwoning Monitor

on:
  schedule:
    # ~Elke 30 min maar op onregelmatige tijden
    - cron: '3,38 0,4,8,12,16,20 * * *'
    - cron: '11,47 1,5,9,13,17,21 * * *'
    - cron: '22,53 2,6,10,14,18,22 * * *'
    - cron: '17,44 3,7,11,15,19,23 * * *'
  workflow_dispatch:
    inputs:
      seed:
        description: 'Alleen bekende_woningen.json bijwerken, geen Telegram'
        type: boolean
        default: false

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps

      - name: Random delay
        run: sleep $((RANDOM % 120 + 30))

      - name: Run monitor
        env:
          VESTEDA_EMAIL: ${{ secrets.VESTEDA_EMAIL }}
          VESTEDA_WACHTWOORD: ${{ secrets.VESTEDA_WACHTWOORD }}
          TELEGRAM_BOT_TOKEN: ${{ inputs.seed && '' || secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ inputs.seed && '' || secrets.TELEGRAM_CHAT_ID }}
        run: python vesteda_monitor.py || true

      - name: Save known properties
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bekende_woningen.json || true
          if git diff --staged --quiet; then
            echo "Geen wijzigingen om op te slaan."
            exit 0
          fi
          git commit -m "Update bekende woningen"
          # Retry push met rebase bij conflicten
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push gelukt op poging $i"
              exit 0
            fi
            echo "Push mislukt op poging $i, rebase + retry..."
            git pull --rebase origin main
            sleep $((RANDOM % 5 + 2))
          done
          echo "FOUT: push mislukt na 5 pogingen!"
          exit 1
